baseURL = "https://afranca.com.br"
locale = "en"
title = "Andre Franca"
enableRobotsTXT = true
disableKinds = ["sitemap"]

[pagination]
  pagerSize = 15

summarylength = 70

[permalinks]
  [permalinks.page]
    posts = "/:slug/"
    pages = "/:slug/"
    rss-only = "/:slug/"

  [permalinks.section]
    posts = "/posts/"

[params]
  description = "Welcome to my personal blog, where I share my thoughts and interests"
  tagline = "I'm Andre, a tech nerd and open source enthusiast"
  colorScheme = "Auto"            # "Light", "Dark", or "Auto"
  hostname = "afranca.com.br"
  showReadingTime = true
  showTagsOnPosts = true
  showRecentPostsFooter = true
  contactEmail = "hello@privatemail.slmail.me"
  webmentionEndpoint = "https://webmention.io/afranca.com.br/webmention"
  pingbackEndpoint = "https://webmention.io/afranca.com.br/xmlrpc"
  fediverseCreator = "@abf@mas.to"
  fediverseURL = "https://mas.to/@abf"
  privacyAndTerms = "/about#privacy-and-terms"
  hostingProvider = "Cloudflare"
  hostingProviderUrl = "https://workers.cloudflare.com/"
  codeLicense = "GNU AGPLv3+"
  codeLicenseURL = "/licenses#code-license"
  contentLicense = "CC BY-NC-SA"
  contentLicenseURL = "/licenses#content-license"
  sourceCode = "https://codeberg.org/abf/afranca-website"

  # Umami analytics
  [params.umami]
    id = "eba2c5a8-602b-46ff-9198-b7aa0af31168"
    scriptUrl = "https://s.afranca.com.br/app"

  # rel="me" identity verification links (IndieWeb)
  [params.relMe]
    ids = ["https://mas.to/@abf", "https://github.com/andrefcodes", "https://codeberg.org/abf", "https://git.sr.ht/~abf/"]

[params.author]
  name = "Andre Franca"
  email = "hello@privatemail.slmail.me"
  bio = "I'm Andre, a tech nerd and open source enthusiast"
  avatar = "/images/avatar/profile.jpeg"
  location = "BR"

  [params.author.social]
    twitter = ""
    bluesky = ""
    mastodon = "https://mas.to/@abf"

[params.footer]
  badges = true

[menus]
  [[menus.main]]
    name = "About"
    url = "/about/"
    weight = 1

  [[menus.main]]
    name = "Contact"
    url = "/contact/"
    weight = 2

  [[menus.main]]
    name = "Blogroll"
    url = "/blogroll/"
    weight = 3

  [[menus.main]]
    name = "Explore"
    url = "/explore/"
    weight = 4

  [[menus.footer]]
    name = "<<<"
    url = "https://xn--sr8hvo.ws/previous"
    weight = 1

  [[menus.footer]]
    name = "IndieWeb Webring 🕸💍"
    url = "https://xn--sr8hvo.ws"
    weight = 2

  [[menus.footer]]
    name = ">>>"
    url = "https://xn--sr8hvo.ws/next"
    weight = 3

[outputs]
  home = ['html', 'atom', 'blogroll', 'sitemap', 'postssitemap', 'pagessitemap', 'tagssitemap']
  section = ['html']
  taxonomy = ['html']
  term = ['html']

[outputFormats]
  [outputFormats.atom]
    mediatype = "application/atom+xml"
    baseName = "feed"
  [outputFormats.sitemap]
    mediatype = "application/xml"
    basename = "sitemap"
  [outputFormats.postssitemap]
    mediatype = "application/xml"
    basename = "posts"
  [outputFormats.pagessitemap]
    mediatype = "application/xml"
    basename = "pages"
  [outputFormats.tagssitemap]
    mediatype = "application/xml"
    basename = "tags"
  [outputFormats.blogroll]
    mediatype = "application/opml+xml"
    basename = "blogroll"

[mediaTypes]
  [mediaTypes."application/atom+xml"]
    suffixes = ["xml"]
  [mediaTypes."application/opml+xml"]
    suffixes = ["opml"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
